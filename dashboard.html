<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>GeBIZ Directory — Analytics</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{--bg:#0f172a;--panel:#1e293b;--panel2:#273449;--border:#334155;--text:#e2e8f0;--muted:#94a3b8;--primary:#3b82f6;--green:#22c55e;--amber:#f59e0b;--violet:#a78bfa}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;padding:24px;max-width:1200px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:22px}
  h1{font-size:1.3rem;font-weight:700}
  h1 small{color:var(--muted);font-weight:400;font-size:.85rem}
  .refresh{font-size:.78rem;color:var(--muted)}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px 20px}
  .stat .label{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
  .stat .num{font-size:2rem;font-weight:800}
  .stat.visits .num{color:var(--primary)}
  .stat.downloads .num{color:var(--green)}
  .stat.signups .num{color:var(--violet)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:22px}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
  .panel h2{font-size:.92rem;margin-bottom:12px;font-weight:700}
  .panel h2 .act{float:right;font-size:.75rem;font-weight:500}
  .act a{color:var(--primary);text-decoration:none}
  .act a:hover{text-decoration:underline}
  canvas{max-height:260px}
  table{width:100%;border-collapse:collapse;font-size:.82rem}
  th,td{text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px}
  th{color:var(--muted);font-weight:600;font-size:.72rem;text-transform:uppercase;letter-spacing:.03em}
  .scroll{max-height:300px;overflow-y:auto}
  .muted{color:var(--muted)}
  .err{background:#7f1d1d;color:#fecaca;padding:14px 18px;border-radius:10px;margin-bottom:18px}
  .btn{display:inline-block;background:var(--primary);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:.82rem;font-weight:600;cursor:pointer;text-decoration:none}
  .btn:hover{background:#2563eb}
  .btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
  @media(max-width:760px){.cards{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>GeBIZ Directory Analytics <small id="updated"></small></h1>
  <div style="display:flex;gap:8px;align-items:center">
    <a class="btn" id="dl-emails">⬇ Mailing list</a>
    <a class="btn ghost" id="dl-downloads">⬇ Download log</a>
    <span class="refresh">auto-refresh 30s</span>
  </div>
</header>

<div id="error" class="err" style="display:none"></div>

<div class="cards">
  <div class="stat visits"><div class="label">Visits</div><div class="num" id="c-visits">–</div></div>
  <div class="stat downloads"><div class="label">CSV Downloads</div><div class="num" id="c-downloads">–</div></div>
  <div class="stat signups"><div class="label">Mailing-list signups</div><div class="num" id="c-signups">–</div></div>
</div>

<div class="grid2">
  <div class="panel"><h2>Visits by day</h2><canvas id="chart-visits"></canvas></div>
  <div class="panel"><h2>Top supply heads downloaded</h2><canvas id="chart-epu"></canvas></div>
</div>

<div class="grid2">
  <div class="panel">
    <h2>Recent signups <span class="act"><a id="dl-emails2">export all →</a></span></h2>
    <div class="scroll"><table><thead><tr><th>Email</th><th>Name</th><th>When</th></tr></thead><tbody id="t-signups"></tbody></table></div>
  </div>
  <div class="panel">
    <h2>Recent downloads</h2>
    <div class="scroll"><table><thead><tr><th>Email</th><th>Filters</th><th>Rows</th><th>When</th></tr></thead><tbody id="t-downloads"></tbody></table></div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const token = params.get('token') || '';
const API = (params.get('api') || '') + '/api';  // same-origin by default
let visitChart, epuChart;

function fmtDate(s){ try{ return new Date(s).toLocaleString('en-SG',{dateStyle:'medium',timeStyle:'short'}); }catch{ return s; } }
function fmtFilters(d){ d=d||{}; const p=[]; if(d.epu&&d.epu.length)p.push(d.epu.join(', ')); if(d.grades&&d.grades.length)p.push('grade '+d.grades.join('/')); if(d.years&&d.years.length)p.push('exp '+d.years.join('/')); if(d.search)p.push('“'+d.search+'”'); if(d.activity)p.push('activity “'+d.activity+'”'); return p.join(' · ')||'all'; }

// Wire export buttons
['dl-emails','dl-emails2'].forEach(id=>{ const el=document.getElementById(id); if(el) el.href = API+'/export?type=signups&token='+encodeURIComponent(token); });
document.getElementById('dl-downloads').href = API+'/export?type=downloads&token='+encodeURIComponent(token);

async function load(){
  try{
    const r = await fetch(API+'/stats?token='+encodeURIComponent(token), {cache:'no-store'});
    if(r.status===401){ showErr('Invalid or missing token. Use the secret link from your Telegram alert.'); return; }
    if(!r.ok){ showErr('Failed to load stats ('+r.status+').'); return; }
    const d = await r.json();
    document.getElementById('error').style.display='none';

    document.getElementById('c-visits').textContent    = d.totals.visits.toLocaleString();
    document.getElementById('c-downloads').textContent = d.totals.downloads.toLocaleString();
    document.getElementById('c-signups').textContent   = d.totals.signups.toLocaleString();
    document.getElementById('updated').textContent = '· updated '+new Date().toLocaleTimeString('en-SG');

    // Visits by day (chronological)
    const vd = [...d.visitsByDay].reverse();
    drawLine('chart-visits', vd.map(x=>x.day), vd.map(x=>x.n));

    // Top EPU
    drawBar('chart-epu', d.topEpu.map(x=>x.code), d.topEpu.map(x=>x.n));

    // Tables
    document.getElementById('t-signups').innerHTML = d.recentSignups.length
      ? d.recentSignups.map(s=>`<tr><td>${esc(s.email)}</td><td>${esc(s.name||'')}</td><td class="muted">${fmtDate(s.created_at)}</td></tr>`).join('')
      : '<tr><td colspan="3" class="muted">No signups yet</td></tr>';

    document.getElementById('t-downloads').innerHTML = d.recentDownloads.length
      ? d.recentDownloads.map(x=>`<tr><td>${esc(x.email||'anon')}</td><td>${esc(fmtFilters(x.detail))}</td><td>${(x.detail&&x.detail.rows)??''}</td><td class="muted">${fmtDate(x.created_at)}</td></tr>`).join('')
      : '<tr><td colspan="4" class="muted">No downloads yet</td></tr>';
  }catch(e){ showErr('Network error loading stats.'); }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showErr(m){ const el=document.getElementById('error'); el.textContent=m; el.style.display='block'; }

function drawLine(id,labels,data){
  const ctx=document.getElementById(id);
  if(visitChart) visitChart.destroy();
  visitChart=new Chart(ctx,{type:'line',data:{labels,datasets:[{data,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,.15)',fill:true,tension:.3,pointRadius:3}]},options:opts()});
}
function drawBar(id,labels,data){
  const ctx=document.getElementById(id);
  if(epuChart) epuChart.destroy();
  epuChart=new Chart(ctx,{type:'bar',data:{labels,datasets:[{data,backgroundColor:'#22c55e'}]},options:opts()});
}
function opts(){return{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#94a3b8',font:{size:10}},grid:{color:'#1e293b'}},y:{beginAtZero:true,ticks:{color:'#94a3b8',precision:0},grid:{color:'#1e293b'}}}};}

load();
setInterval(load, 30000);
</script>
</body>
</html>
